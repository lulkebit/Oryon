<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E2124" />
      <stop offset="100%" stop-color="#101113" />
    </linearGradient>
    <linearGradient id="sage-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B2C5B4" />
      <stop offset="100%" stop-color="#889C8A" />
    </linearGradient>
    <linearGradient id="track-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#262A2C" />
      <stop offset="100%" stop-color="#181A1C" />
    </linearGradient>
    <filter id="elevate" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35" />
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2" />
    </filter>
    <mask id="core-mask">
      <rect width="512" height="512" fill="white" />
      <circle cx="256" cy="256" r="24" fill="black" />
    </mask>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg-grad)" />
  <rect width="510" height="510" x="1" y="1" rx="115" stroke="#2A2D30" stroke-width="2" fill="none" opacity="0.5" />

  <g transform="translate(0, 0)">
    <circle cx="256" cy="256" r="160" stroke="url(#track-grad)" stroke-width="4" fill="none" />
    <circle
      cx="256" cy="256" r="160"
      stroke="url(#sage-grad)"
      stroke-width="24"
      stroke-dasharray="754 252"
      stroke-linecap="round"
      fill="none"
      filter="url(#elevate)"
    />
    <circle
      cx="369.14" cy="142.86" r="12"
      fill="url(#sage-grad)"
      filter="url(#elevate)"
    />
    <rect
      x="192" y="192"
      width="128" height="128"
      rx="32"
      fill="url(#sage-grad)"
      mask="url(#core-mask)"
      filter="url(#elevate)"
    />
  </g>
</svg>
